name: Deploy Static Site

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force refresh content'
        required: false
        default: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build and Deploy
        uses: actions/deploy-pages@v4